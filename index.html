<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift & Sleep Sync Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(24, 24, 27, 0.8); border: 1px solid #3f3f46; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-2xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold">Sleep/Shift Sync Optimizer</h1>
        
        <div class="glass rounded-xl p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Shift Selection -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-zinc-400">Shift Schedule</label>
                    <select id="shift" class="w-full bg-zinc-900 border border-zinc-700 rounded p-2">
                        <option value="07-15">Day (07:00 - 15:00)</option>
                        <option value="15-23">Swing (15:00 - 23:00)</option>
                        <option value="23-07">Night (23:00 - 07:00)</option>
                    </select>
                </div>

                <!-- Sleep Window -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-zinc-400">Bedtime</label>
                        <input type="time" id="bedtime" value="22:00" class="w-full bg-zinc-900 border border-zinc-700 rounded p-2">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-zinc-400">Wake Time</label>
                        <input type="time" id="waketime" value="06:00" class="w-full bg-zinc-900 border border-zinc-700 rounded p-2">
                    </div>
                </div>
            </div>

            <!-- Result Box -->
            <div id="result" class="p-4 rounded-lg bg-zinc-900 border border-zinc-800 hidden space-y-4">
                <div class="flex justify-between items-center">
                    <div>
                        <div id="duration" class="text-2xl font-bold"></div>
                        <div id="exhaustionLevel" class="text-sm font-semibold mt-1"></div>
                    </div>
                    <div id="badge" class="px-3 py-1 rounded-full text-xs font-bold"></div>
                </div>
                <div id="syncStatus" class="text-xs text-zinc-400 italic"></div>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['shift', 'bedtime', 'waketime'];
        
        function calculate() {
            const shift = document.getElementById('shift').value;
            const bed = document.getElementById('bedtime').value.split(':').map(Number);
            const wake = document.getElementById('waketime').value.split(':').map(Number);
            
            let start = bed[0] + bed[1] / 60;
            let stop = wake[0] + wake[1] / 60;
            
            let hours = stop - start;
            if (hours < 0) hours += 24;
            
            const [wS, wE] = shift.split('-').map(Number);
            
            // Fatigue/Exhaustion Factor
            // < 5hrs: Severe, 5-7hrs: High, 7-9hrs: Optimal
            let fatigueFactor = "";
            let badgeClass = "";
            let badgeText = "";
            
            if (hours < 5) {
                fatigueFactor = "Severe Exhaustion (High Impairment)";
                badgeClass = "bg-red-900 text-red-200";
                badgeText = "CRITICAL";
            } else if (hours < 7) {
                fatigueFactor = "Elevated Exhaustion (Reduced Cognitive Speed)";
                badgeClass = "bg-amber-900 text-amber-200";
                badgeText = "WARNING";
            } else {
                fatigueFactor = "Recovery Optimal";
                badgeClass = "bg-emerald-900 text-emerald-200";
                badgeText = "SYNCED";
            }

            // Overlap check
            const isOverlap = (start < stop) ? 
                (start < wE && stop > wS) : 
                (start < wE || stop > wS);

            const result = document.getElementById('result');
            result.classList.remove('hidden');
            document.getElementById('duration').innerText = `${hours.toFixed(1)} hours of sleep`;
            document.getElementById('exhaustionLevel').innerText = fatigueFactor;
            
            const badge = document.getElementById('badge');
            const status = document.getElementById('syncStatus');
            
            badge.innerText = badgeText;
            badge.className = `px-3 py-1 rounded-full text-xs font-bold ${badgeClass}`;
            
            if (isOverlap) {
                status.innerText = "Conflict Detected: Sleep window overlaps with duty.";
            } else {
                status.innerText = "Sleep window is clear of duty period.";
            }
        }

        inputs.forEach(id => document.getElementById(id).addEventListener('change', calculate));
        calculate();
    </script>
</body>
</html>
