<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circadian Shift & Work-Life Sync Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f3f4f6; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 bg-slate-950">
    <div class="max-w-4xl mx-auto space-y-8">
        <header class="border-b border-slate-800 pb-6">
            <h1 class="text-3xl font-extrabold text-white">Circadian Shift & Work-Life Sync Optimizer</h1>
            <p class="text-slate-400 mt-2">Design-to-safety modeling tool for high-tempo aviation shift rosters.</p>
        </header>

        <div class="glass-panel rounded-2xl p-8">
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <label class="block text-sm font-semibold text-slate-300">Shift Type</label>
                    <select id="shiftType" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white">
                        <option value="day">Day Shift (07:00 - 15:00)</option>
                        <option value="swing">Swing Shift (15:00 - 23:00)</option>
                        <option value="night">Midnight Shift (23:00 - 07:00)</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <label class="block text-sm font-semibold text-slate-300">Sleep Start Hour</label>
                    <input type="range" id="sleepStart" min="0" max="23" value="8" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                    <span id="sleepLabel" class="text-indigo-400 font-mono">08:00</span>
                </div>
            </div>
            <div class="mt-8 pt-8 border-t border-slate-800">
                <div id="analysis" class="text-slate-300 italic">Adjust sliders to see circadian analysis...</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const shiftSelect = document.getElementById('shiftType');
            const sleepSlider = document.getElementById('sleepStart');
            const sleepLabel = document.getElementById('sleepLabel');
            const analysis = document.getElementById('analysis');
            
            // Assuming a standard 7-hour physiological recovery requirement
            const SLEEP_DURATION = 7;

            function update() {
                const hourValue = parseInt(sleepSlider.value, 10);
                const time = hourValue.toString().padStart(2, '0');
                sleepLabel.innerText = `${time}:00`;
                
                const shift = shiftSelect.value;
                const sleepEnd = (hourValue + SLEEP_DURATION) % 24;
                
                // Logic based on shift and the full duration of the recovery window
                if (shift === 'night') {
                    // Ideal night recovery is ~07:00 to 14:00/15:00
                    if (hourValue >= 7 && hourValue <= 8) {
                        analysis.innerHTML = `<span class="text-emerald-400 font-bold">Optimal Alignment:</span> Your ${SLEEP_DURATION}-hour window (${time}:00 - ${sleepEnd.toString().padStart(2, '0')}:00) is anchored correctly for night shift recovery.`;
                    } else {
                        analysis.innerHTML = '<span class="text-amber-400 font-bold">Warning:</span> Your sleep window is at risk of circadian misalignment. Try shifting to a morning anchor (07:00 - 08:00) to ensure a full recovery window.';
                    }
                } else if (shift === 'day') {
                    // Day shift usually requires sleep ending before 07:00
                    if (hourValue >= 21 || hourValue <= 23) {
                        analysis.innerHTML = `<span class="text-emerald-400 font-bold">Optimal Alignment:</span> Your ${SLEEP_DURATION}-hour window (${time}:00 - ${sleepEnd.toString().padStart(2, '0')}:00) is anchored for standard diurnal recovery.`;
                    } else {
                        analysis.innerHTML = '<span class="text-amber-400 font-bold">Note:</span> Your recovery window is unconventional for a day shift. Ensure you are not overlapping with pre-shift hours.';
                    }
                } else if (shift === 'swing') {
                    // Swing shift usually allows sleep from ~00:00 to 07:00
                    if (hourValue >= 0 && hourValue <= 1) {
                        analysis.innerHTML = `<span class="text-emerald-400 font-bold">Optimal Alignment:</span> Your ${SLEEP_DURATION}-hour window (${time}:00 - ${sleepEnd.toString().padStart(2, '0')}:00) is well-suited for post-swing shift recovery.`;
                    } else {
                        analysis.innerHTML = '<span class="text-amber-400 font-bold">Note:</span> Consider aligning your sleep start to midnight (00:00 - 01:00) for optimal swing shift recovery.';
                    }
                }
            }

            shiftSelect.addEventListener('change', update);
            sleepSlider.addEventListener('input', update);
            
            update();
        });
    </script>
</body>
</html>
